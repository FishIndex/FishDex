const rarityNames = ["Trash","Abundant","Common","Curious","Elusive","Fabled","Mythic","Exotic","Secret","UltimateSecret","Relic"];
const colors = ["#888888","#aaaaaa","#78d4a0","#58a6ff","#a8dadc","#c084fc","#f59e0b","#ef4444","#f97316","#ffffff","#ffd700"];
const luckVals = data.luck;

const datasets = rarityNames.map((name, i) => ({
  label: name === "UltimateSecret" ? "Ult. Secret" : name,
  data: name === "Relic" ? data.relic : data[name],
  borderColor: colors[i],
  backgroundColor: colors[i] + "22",
  borderWidth: 2,
  pointRadius: 0,
  tension: 0.3,
}));

const ctx = document.getElementById('myChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { labels: luckVals.map(l => l.toFixed(1)), datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#161b22',
        borderColor: '#30363d',
        borderWidth: 1,
        titleColor: '#58a6ff',
        bodyColor: '#e6edf3',
        callbacks: {
          title: (items) => `Luck: ${items[0].label}×`,
          label: (item) => ` ${item.dataset.label}: ${item.raw.toFixed(3)}%`
        }
      }
    },
    scales: {
      x: {
        ticks: { color: '#8b949e', maxTicksLimit: 20, callback: (v, i) => luckVals[i] % 2 === 0 ? luckVals[i].toFixed(0) + '×' : '' },
        grid: { color: '#21262d' },
        title: { display: true, text: 'Luck Multiplier', color: '#8b949e' }
      },
      y: {
        ticks: { color: '#8b949e', callback: v => v.toFixed(1) + '%' },
        grid: { color: '#21262d' },
        title: { display: true, text: 'Catch Chance (%)', color: '#8b949e' }
      }
    }
  }
});

// Marker line plugin
let markerX = 80; // index for 9.0x

const markerPlugin = {
  id: 'markerLine',
  afterDraw(chart) {
    const idx = parseInt(document.getElementById('markerSlider').value) - 10;
    const meta = chart.getDatasetMeta(0);
    if (!meta.data[idx]) return;
    const x = meta.data[idx].x;
    const ctx = chart.ctx;
    const yAxis = chart.scales.y;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x, yAxis.top);
    ctx.lineTo(x, yAxis.bottom);
    ctx.strokeStyle = '#58a6ff88';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.restore();
  }
};
Chart.register(markerPlugin);

function updateMarker(val) {
  const idx = val - 10;
  const luck = luckVals[idx];
  document.getElementById('markerLabel').textContent = luck.toFixed(1) + '×';
  document.getElementById('infoTitle').textContent = `Chances at ${luck.toFixed(1)}× luck`;
  const rows = rarityNames.map((name, i) => {
    const chance = name === 'Relic' ? 3.0 : (data[name] ? data[name][idx] : 0);
    const displayName = name === 'UltimateSecret' ? 'Ult. Secret' : name;
    return `<div class="info-row"><span class="name" style="color:${colors[i]}">${displayName}</span><span class="val" style="color:${colors[i]}">${chance.toFixed(3)}%</span></div>`;
  });
  document.getElementById('infoRows').innerHTML = rows.join('');
  chart.update('none');
}

document.getElementById('markerSlider').addEventListener('input', e => updateMarker(parseInt(e.target.value)));
updateMarker(90);

function calcMultiplier() {
  const rod = parseFloat(document.getElementById('rodLuck').value) || 0;
  const line = parseFloat(document.getElementById('lineLuck').value) || 0;
  const bobber = parseFloat(document.getElementById('bobberLuck').value) || 0;
  const rodMult = 1.0 + rod / 50.0;
  const lineMult = 1.0 + line / 50.0;
  const bobberMult = 1.0 + bobber / 50.0;
  return rodMult * lineMult * bobberMult;
}

function applyConverter() {
  const total = calcMultiplier();
  document.getElementById('convResult').textContent = total.toFixed(2) + '×';
  // find closest index in luck array
  let closest = 0;
  let minDiff = Infinity;
  luckVals.forEach((l, i) => {
    const diff = Math.abs(l - total);
    if (diff < minDiff) { minDiff = diff; closest = i; }
  });
  const sliderVal = closest + 10;
  document.getElementById('markerSlider').value = Math.min(200, Math.max(10, sliderVal));
  updateMarker(parseInt(document.getElementById('markerSlider').value));
}

['rodLuck','lineLuck','bobberLuck'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const total = calcMultiplier();
    document.getElementById('convResult').textContent = total.toFixed(2) + '×';
  });
});

// init converter display
applyConverter();

// Toggle buttons
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = parseInt(btn.dataset.idx);
    const ds = chart.data.datasets[idx];
    ds.hidden = !ds.hidden;
    btn.style.opacity = ds.hidden ? '0.35' : '1';
    chart.update();
  });
});
</script>
